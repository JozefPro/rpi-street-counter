camera:
  index: 0
  # Balanced live-view profile for Raspberry Pi 5.
  # 1920x1080 can be tested later for benchmarking, but MJPEG is CPU-heavy.
  width: 1280
  height: 720
  fps: 30

server:
  host: "0.0.0.0"
  port: 5000
  debug: false

stream:
  jpeg_quality: 70
  max_stream_fps: 15
  delay_frames: 4

detection:
  enabled: true
  model: "yolo_nano"
  confidence_threshold: 0.35
  classes:
    - car
    - truck
    - bus
    - motorcycle
  run_every_n_frames: 3
  input_size: 640

counting:
  enabled: true
  draw_lines: true
  label_offset_px: [-28, -14]
  counted_classes:
    - car
    - truck
    - bus
    - motorcycle
    - motorbike

  line_a:
    name: "A"
    p1_norm: [0.14, 0.66]
    p2_norm: [0.69, 0.28]
    color: [0, 0, 255]

  line_b:
    name: "B"
    p1_norm: [0.42, 0.98]
    p2_norm: [0.94, 0.47]
    color: [0, 0, 255]

  sequence_a_then_b: "left"
  sequence_b_then_a: "right"
  max_track_age_seconds: 6.0

tracking:
  max_distance_px: 190
  max_age_seconds: 6.0

debug:
  draw_track_centers: true
  draw_track_ids: true
  draw_movement_segments: false

models:
  yolo_nano:
    type: "opencv_dnn_yolo"
    weights: "models/yolov5n.onnx"
    url: "https://github.com/ultralytics/yolov5/releases/download/v7.0/yolov5n.onnx"

project:
  name: "RPI5 Street Counter"
