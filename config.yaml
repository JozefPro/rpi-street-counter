camera:
  index: 0
  # Balanced live-view profile for Raspberry Pi 5.
  # 1920x1080 can be tested later for benchmarking, but MJPEG is CPU-heavy.
  width: 1280
  height: 720
  fps: 30

server:
  host: "0.0.0.0"
  port: 5000
  debug: false

stream:
  jpeg_quality: 70
  max_stream_fps: 15
  delay_frames: 4

detection:
  enabled: true
  model: "yolo_nano"
  confidence_threshold: 0.35
  classes:
    - car
    - truck
    - bus
    - motorcycle
  run_every_n_frames: 3
  input_size: 640

counting:
  enabled: true
  draw_lines: true

  line_a:
    name: "A"
    p1_norm: [0.36, 0.58]
    p2_norm: [0.62, 0.39]
    color: [0, 0, 255]

  line_b:
    name: "B"
    p1_norm: [0.75, 0.89]
    p2_norm: [0.96, 0.65]
    color: [0, 0, 255]

  sequence_a_then_b: "left"
  sequence_b_then_a: "right"
  max_track_age_seconds: 3.0

models:
  yolo_nano:
    type: "opencv_dnn_yolo"
    weights: "models/yolov5n.onnx"
    url: "https://github.com/ultralytics/yolov5/releases/download/v7.0/yolov5n.onnx"

project:
  name: "RPI5 Street Counter"
